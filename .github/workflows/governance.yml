name: Governance

on:
  schedule:
    - cron: "17 1 * * *"
    - cron: "31 2 * * 1"
    - cron: "47 3 1,15 * *"
    - cron: "5 4 1 * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Governance task to run."
        required: true
        default: "daily-production-health"
        type: choice
        options:
          - daily-production-health
          - weekly-data-governance
          - biweekly-live-check
          - monthly-corpus-review

jobs:
  select-task:
    runs-on: ubuntu-latest
    outputs:
      task: ${{ steps.task.outputs.task }}
    steps:
      - id: task
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            task="${{ inputs.task }}"
          elif [ "${{ github.event.schedule }}" = "17 1 * * *" ]; then
            task="daily-production-health"
          elif [ "${{ github.event.schedule }}" = "31 2 * * 1" ]; then
            task="weekly-data-governance"
          elif [ "${{ github.event.schedule }}" = "47 3 1,15 * *" ]; then
            task="biweekly-live-check"
          elif [ "${{ github.event.schedule }}" = "5 4 1 * *" ]; then
            task="monthly-corpus-review"
          else
            task="daily-production-health"
          fi
          echo "task=$task" >> "$GITHUB_OUTPUT"

  governance:
    needs: select-task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run governance task
        env:
          GOVERNANCE_RECORD_SECRET: ${{ secrets.SYNC_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/run-governance-task.mjs "${{ needs.select-task.outputs.task }}"
