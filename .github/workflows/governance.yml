name: Governance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Governance task to run."
        required: true
        default: "daily-production-health"
        type: choice
        options:
          - daily-production-health
          - weekly-data-governance
          - biweekly-live-check
          - monthly-corpus-review

jobs:
  select-task:
    runs-on: ubuntu-latest
    outputs:
      task: ${{ steps.task.outputs.task }}
    steps:
      - id: task
        shell: bash
        run: |
          task="${{ inputs.task }}"
          echo "task=$task" >> "$GITHUB_OUTPUT"

  governance:
    needs: select-task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run governance task
        env:
          GOVERNANCE_RECORD_SECRET: ${{ secrets.SYNC_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/run-governance-task.mjs "${{ needs.select-task.outputs.task }}"
