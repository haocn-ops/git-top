name: Governance

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Governance task to run."
        required: true
        default: "daily-production-health"
        type: choice
        options:
          - daily-production-health
          - production-data-maintenance
          - production-alternatives-segment
          - weekly-data-governance
          - biweekly-live-check
          - monthly-corpus-review
      alternatives_start_offset:
        description: "Project offset for resuming production alternatives maintenance."
        required: false
        default: "0"
        type: string
      alternatives_batch_size:
        description: "Projects per alternatives request; keep at or below 25."
        required: false
        default: "10"
        type: string
      alternatives_max_batches:
        description: "Maximum alternatives batches in this run; 0 means all remaining batches."
        required: false
        default: "0"
        type: string

jobs:
  select-task:
    runs-on: ubuntu-latest
    outputs:
      task: ${{ steps.task.outputs.task }}
    steps:
      - id: task
        shell: bash
        run: |
          task="${{ inputs.task }}"
          echo "task=$task" >> "$GITHUB_OUTPUT"

  governance:
    needs: select-task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run governance task
        env:
          GOVERNANCE_RECORD_SECRET: ${{ secrets.SYNC_SECRET }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          GIT_TOP_ALTERNATIVES_START_OFFSET: ${{ inputs.alternatives_start_offset }}
          GIT_TOP_ALTERNATIVES_BATCH_SIZE: ${{ inputs.alternatives_batch_size }}
          GIT_TOP_ALTERNATIVES_MAX_BATCHES: ${{ inputs.alternatives_max_batches }}
        run: node scripts/run-governance-task.mjs "${{ needs.select-task.outputs.task }}"
